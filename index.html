<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Redirecting to sametcc.me</title>
		<meta name="description" content="This page now redirects to https://sametcc.me." />

		<meta property="og:url" content="https://sametcn99.github.io/" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Redirecting to sametcc.me" />
		<meta property="og:description" content="This page now redirects to https://sametcc.me." />

		<meta name="twitter:card" content="summary_large_image" />
		<meta property="twitter:domain" content="sametcn99.github.io" />
		<meta property="twitter:url" content="https://sametcn99.github.io/" />
		<meta name="twitter:title" content="Redirecting to sametcc.me" />
		<meta name="twitter:description" content="This page now redirects to https://sametcc.me." />

		<meta name="robots" content="index, follow" />
		<meta name="author" content="Samet Can Cıncık" />
		<meta http-equiv="content-language" content="en" />
		<meta property="og:locale" content="en_US" />
	</head>
	<body>
		<main
			aria-labelledby="page-title"
			aria-describedby="redirect-message manual-message"
			itemscope
			itemtype="https://schema.org/Person"
		>
			<h1 id="page-title" itemprop="name">Samet Can Cıncık Personal Website</h1>
			<p id="redirect-message">
				Samet Can Cıncık's official website is available at
				<a href="https://sametcc.me" itemprop="url">sametcc.me</a>.
			</p>
			<p id="manual-message">
				You will be redirected automatically in
				<span id="countdown" role="timer" aria-live="off" aria-atomic="true">3</span>
				seconds. If the redirect does not start, use this link:
				<a href="https://sametcc.me">Open sametcc.me</a>.
			</p>
			<noscript>
				<p>JavaScript is disabled. Use the Open sametcc.me link above to continue to the official website.</p>
			</noscript>
		</main>

		<script>
			const targetUrl = "https://sametcc.me";
			const redirectDelay = 3000;
			const countdownElement = document.getElementById("countdown");
			let remainingSeconds = Math.ceil(redirectDelay / 1000);

			const countdownInterval = window.setInterval(() => {
				remainingSeconds -= 1;
				countdownElement.textContent = String(Math.max(remainingSeconds, 0));

				if (remainingSeconds <= 0) {
					window.clearInterval(countdownInterval);
				}
			}, 1000);

			window.setTimeout(() => {
				window.clearInterval(countdownInterval);
				countdownElement.textContent = "0";
				window.location.replace(targetUrl);
			}, redirectDelay);
		</script>
	</body>
</html>
